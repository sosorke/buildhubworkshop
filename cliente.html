<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Area do cliente BuildHub.">
  <title>Area do Cliente | BuildHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cliente">
  <div class="loader" id="loader" aria-label="Carregando area do cliente">
     <span class="brand-symbol" id="brandSymbol"><img src="assets/images/logobranca.png" alt="" aria-hidden="true"><span class="brand-fallback">BH</span></span>
    <div class="loader-line"></div>
  </div>
    <div class="loader-line"></div>
  </div>

  <div class="custom-cursor" id="customCursor" aria-hidden="true"></div>
  <canvas id="particleCanvas" aria-hidden="true"></canvas>
  <div class="floating-grid" id="floatingGrid" aria-hidden="true"></div>

  <main>
    <section class="dashboard-section" id="dashboard" hidden>
      <aside class="sidebar glass">
        <a class="brand dashboard-brand" href="index.html">
          <span class="brand-symbol" id="brandSymbol"><img src="assets/images/logobranca.png" alt="" aria-hidden="true"><span class="brand-fallback">BH</span></span>
          <span class="brand-text" id="brandText">BuildHub</span>
        </a>
        <nav id="dashboardMenu" aria-label="Menu da area do cliente"></nav>
        <a class="btn btn-ghost" href="index.html">Site</a>
        <button class="btn btn-ghost" id="logoutButton" type="button">Sair</button>
      </aside>

      <div class="dashboard-main">
        <div class="dashboard-top">
          <div>
            <p class="eyebrow" id="dashboardRole">Nivel CLIENTE</p>
            <h2 id="dashboardTitle">Area do cliente</h2>
          </div>
          <span class="status-pill">Online</span>
        </div>
        <div class="dashboard-content" id="dashboardContent"></div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <button class="to-top" id="toTop" type="button" aria-label="Voltar ao topo">^</button>
  <script src="js/script.js"></script>
</body>
</html>
